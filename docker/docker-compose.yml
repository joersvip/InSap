version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: wa_intel_db
    restart: always
    environment:
      POSTGRES_DB: whatsapp_analyzer
      POSTGRES_USER: intel_admin
      POSTGRES_PASSWORD: supersecure_db_pass_99
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel_admin -d whatsapp_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Key-Value & Queue Store (Redis)
  redis:
    image: redis:7-alpine
    container_name: wa_intel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Laravel 12 Backend (PHP 8.4)
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: wa_intel_backend
    restart: always
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:intelligence_whatsapp_analyzer_key_32bytes_placeholder_
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: whatsapp_analyzer
      DB_USERNAME: intel_admin
      DB_PASSWORD: supersecure_db_pass_99
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      OLLAMA_HOST: http://ollama:11434
      BAILEYS_SERVICE_URL: http://baileys:3001
    volumes:
      - ../backend:/var/www/html
      - ../storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Laravel Queue Worker
  queue-worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: wa_intel_queue
    restart: always
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: whatsapp_analyzer
      DB_USERNAME: intel_admin
      DB_PASSWORD: supersecure_db_pass_99
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - backend

  # 5. WhatsApp Gateway (Baileys Multi-Device)
  baileys:
    build:
      context: ../docker/baileys-service
    container_name: wa_intel_baileys
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      WEBHOOK_URL: http://backend:8000/api/whatsapp/webhook
      DB_URL: postgresql://intel_admin:supersecure_db_pass_99@db:5432/whatsapp_analyzer
    volumes:
      - baileys_auth:/app/baileys_auth_store
    depends_on:
      db:
        condition: service_healthy

  # 6. Offline AI Engine (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: wa_intel_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # If the local machine has NVIDIA GPU, uncomment the following section:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # 7. Frontend Service (Vite Development / Production server)
  frontend:
    image: node:18-alpine
    container_name: wa_intel_frontend
    restart: always
    working_dir: /app
    volumes:
      - ../frontend:/app
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

  # 8. Web Server (Nginx Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: wa_intel_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  baileys_auth:
    driver: local
  ollama_models:
    driver: local
